name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      # Brewfile covers local macOS setup; runners build kissat from source.
      - run: |
          git clone --depth 1 https://github.com/arminbiere/kissat /tmp/kissat
          cd /tmp/kissat && ./configure && make -j
          echo "/tmp/kissat/build" >> "$GITHUB_PATH"
      - run: script/cibuild
